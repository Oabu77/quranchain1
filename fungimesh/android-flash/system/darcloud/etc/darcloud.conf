#!/system/bin/sh
##############################################################################
# DarCloud MeshTalk OS — Configuration
# All services read from this file
##############################################################################

# --- Identity ---
DARCLOUD_API="https://darcloud.host"
NODE_TYPE="mobile-supernode"
REGION="us-east"

# --- Network ---
MESH_SUBNET="10.77.0.0/16"
CLIENT_SUBNET="10.78.0.0/24"
WIREGUARD_PORT=51820
MESH_LISTEN_PORT=51821

# --- WiFi Gateway ---
WIFI_SSID="DarCloud-WiFi"
WIFI_PASS="DarCloud2026"
WIFI_CHANNEL=6
CAPTIVE_PORTAL_PORT=8888
HEALTH_PORT=8080
DHCP_RANGE_START="10.78.0.10"
DHCP_RANGE_END="10.78.0.250"
DHCP_LEASE="12h"

# --- Mesh ---
BATMAN_IFACE="bat0"
MESH_IFACE="mesh0"
HEARTBEAT_INTERVAL=120

# --- MeshTalk ---
MESHTALK_UDP_PORT=10099
MESHTALK_TCP_PORT=11099
MESHTALK_VOICE_PORT=10100
MESHTALK_TEXT_PORT=10101

# --- Telecom ---
TELECOM_UDP_BASE=10001
TELECOM_TCP_BASE=11001
TELECOM_DNS_BASE=12001

# --- eSIM / SIM ---
ESIM_APN="darcloud.5g"
ESIM_PLMN="99970"
ESIM_MCC="999"
ESIM_MNC="70"
ESIM_SMDP="smdp.dartelecom.darcloud.host"

# --- Voice (VoIP/VoLTE) ---
VOICE_SIP_PORT=5060
VOICE_RTP_PORT=10200
VOICE_SRTP_PORT=10201

# --- Messaging (SMS/MMS) ---
MSG_MESH_PORT=10300
MMS_MMSC="http://mmsc.dartelecom.darcloud.host"
MMS_PROXY="proxy.dartelecom.darcloud.host"
MMS_PORT=8080

# --- 5G Modem ---
MODEM_PREFERRED_MODE="nr_lte"
MODEM_NR_BANDS="41,48,71,77,78,258,260,261"
MODEM_LTE_BANDS="2,4,5,7,12,13,14,25,26,30,41,46,48,66,71"

# --- US Carrier Profiles (auto-detected by darcloud-5g-modem) ---
# T-Mobile: NR(n41,n71,n258) LTE(B2,B4,B12,B66,B71) APN:fast.t-mobile.com
# AT&T:     NR(n77,n5,n258)  LTE(B2,B4,B5,B12,B14,B30,B66) APN:nrphone
# Verizon:  NR(n77,n258/260/261) LTE(B2,B4,B5,B13,B66) APN:vzwinternet
# US Cell:  NR(n71,n77) LTE(B2,B4,B5,B12) APN:usccinternet
# Dish:     NR(n71,n26) LTE(B2,B4,B12,B66) APN:data.boostmobile.com
# DarTele:  NR(n48,n41,n71,n77) LTE(all) APN:darcloud.5g
CARRIER_AUTO_DETECT="true"

# --- Tunnel ---
TUNNEL_HEALTH_PORT=8089
TUNNEL_STUN_SERVERS="stun.l.google.com:19302,stun.cloudflare.com:3478"
TUNNEL_PEER_CHECK_INTERVAL=600
TUNNEL_DEAD_RECOVERY_INTERVAL=1200

# --- Omar AI™ AMĀN Control Plane ---
OMARAI_PORT=9090
OMARAI_API_ENDPOINT="$DARCLOUD_API/api/sovereign"
OMARAI_ROLE="sovereign-controller"
OMARAI_HEARTBEAT_INTERVAL=120
OMARAI_COMMAND_SYNC_INTERVAL=30
OMARAI_AUTO_HEAL="true"
OMARAI_DISCORD_ALERTS="true"
OMARAI_VERSION="2.0.0"

# --- Directories ---
DATA_DIR="/data/darcloud"
MESH_DIR="/data/darcloud/mesh"
PID_DIR="/data/darcloud/pids"
LOG_DIR="/data/darcloud/logs"
TUNNEL_ENDPOINT_REFRESH=1800
TUNNEL_TOPOLOGY_SYNC=3600

# --- Paths ---
DATA_DIR="/data/darcloud"
LOG_DIR="/data/darcloud/logs"
WG_DIR="/data/darcloud/wireguard"
MESH_DIR="/data/darcloud/mesh"
PID_DIR="/data/darcloud/pids"

logger:
  file:
    path: /opt/open5gs/var/log/open5gs/mme.log
  level: info

mme:
  sbi:
    client:
      nrf:
        - uri: http://nrf:7777
      scp:
        - uri: http://scp:7777
  s1ap:
    server:
      - address: 0.0.0.0
  gtpc:
    server:
      - address: 0.0.0.0
    client:
      sgwc:
        - address: sgwc
      smf:
        - address: smf
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090
  gummei:
    - plmn_id:
        mcc: 999
        mnc: 70
      mme_gid: 2
      mme_code: 1
  tai:
    - plmn_id:
        mcc: 999
        mnc: 70
      tac: 1
  security:
    integrity_order: [EIA2, EIA1, EIA0]
    ciphering_order: [EEA0, EEA1, EEA2]
  network_name:
    full: DarTelecom MeshTalk LTE
    short: DarTelecom
  mme_name: DarTelecom-MME
  freeDiameter: /opt/open5gs/etc/freeDiameter/mme.conf

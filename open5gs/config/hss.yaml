logger:
  file:
    path: /opt/open5gs/var/log/open5gs/hss.log
  level: info

db_uri: mongodb://mongodb/open5gs

hss:
  sbi:
    server:
      - address: 0.0.0.0
        port: 7777
    client:
      nrf:
        - uri: http://nrf:7777
      scp:
        - uri: http://scp:7777
  freeDiameter: /opt/open5gs/etc/freeDiameter/hss.conf

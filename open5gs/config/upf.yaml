logger:
  file:
    path: /opt/open5gs/var/log/open5gs/upf.log
  level: info

upf:
  pfcp:
    server:
      - address: 0.0.0.0
    client:
      smf:
        - address: smf
  gtpu:
    server:
      - address: 0.0.0.0
  session:
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dev: ogstun
    - subnet: 2001:db8:cafe::/48
      gateway: 2001:db8:cafe::1
      dev: ogstun
  metrics:
    server:
      - address: 0.0.0.0
        port: 9090

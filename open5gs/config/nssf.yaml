logger:
  file:
    path: /opt/open5gs/var/log/open5gs/nssf.log
  level: info

nssf:
  sbi:
    server:
      - address: 0.0.0.0
        port: 7777
    client:
      nrf:
        - uri: http://nrf:7777
      scp:
        - uri: http://scp:7777
  nsi:
    - s_nssai:
        sst: 1
        sd: 000001
      nrf:
        - uri: http://nrf:7777
    - s_nssai:
        sst: 2
        sd: 000001
      nrf:
        - uri: http://nrf:7777
